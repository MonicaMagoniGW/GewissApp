# -- Override chart name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

app:
  replicaCount: 1

  # -- Namespace management
  namespace:
    # -- Create the release namespace if needed.
    create: true
    # -- Optional labels applied only to the release namespace.
    labels: {}
    # -- Optional annotations applied only to the release namespace.
    annotations: {}

  image:
    repository: nginx
    pullSecrets: []
    tag: ""
    pullPolicy: IfNotPresent

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  containerPort: 8080

  service:
    enabled: true
    annotations: {}
    type: ClusterIP
    port: 80
    targetPort: http

  configMap:
    enabled: false
    annotations: {}
    data: {}
    binaryData: {}
    envFrom: false
    mount:
      enabled: false
      path: /config
      readOnly: true

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: null

  pdb:
    enabled: false
    minAvailable: null
    maxUnavailable: null

  # -- Base Guaranteed QoS resources.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 250m
      memory: 512Mi

  # -- Topology spread constraints for pod scheduling.
  topologySpreadConstraints:
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
