{{- if and .Values.app.namespace .Values.app.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "gwapp.namespace" . }}
  labels:
    {{- include "gwapp.labels" . | nindent 4 }}
    {{- with .Values.app.namespace.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.app.namespace.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
