{{- if and (not .Values.app.configMap.enabled) (or .Values.app.configMap.envFrom .Values.app.configMap.mount.enabled) -}}
{{- fail "app.configMap.envFrom and app.configMap.mount.enabled require app.configMap.enabled=true" -}}
{{- end -}}

{{- if gt .Values.app.autoscaling.minReplicas .Values.app.autoscaling.maxReplicas -}}
{{- fail "app.autoscaling.minReplicas cannot be greater than app.autoscaling.maxReplicas" -}}
{{- end -}}
